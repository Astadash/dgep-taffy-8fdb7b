// ── CSV PARSE ────────────────────────────────────────────────────────────────
function parseCSV(txt){
  const rows=[];let cur=[],field='',inQ=false;
  const NL='\n',CR='\r',COMMA=',',QUOTE='"';
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(inQ){
      if(c===QUOTE&&txt[i+1]===QUOTE){field+=QUOTE;i++;}
      else if(c===QUOTE)inQ=false;
      else field+=c;
    }else if(c===QUOTE)inQ=true;
    else if(c===COMMA){cur.push(field);field='';}
    else if(c===NL||c===CR){
      cur.push(field);field='';
      if(cur.some(f=>f!==''))rows.push(cur);
      cur=[];
      if(c===CR&&txt[i+1]===NL)i++;
    }else field+=c;
  }
  cur.push(field);
  if(cur.some(f=>f!==''))rows.push(cur);
  return rows;
}
function csvToSubs(txt){
  const rows=parseCSV(txt);if(rows.length<2)return[];
  const hdrs=rows[0];
  return rows.slice(1).map(row=>{
    const o={};hdrs.forEach((h,i)=>o[h]=(row[i]||''));
    return{name:o['Business Name']||'',type:o['Business Type']||'',locs:o['Locations']||'',
      reg:o['Registration']||'',score:parseFloat(o['Green Score'])||0,band:o['Performance Band']||'',
      A:o['Dim A: Energy'],B:o['Dim B: Water'],C:o['Dim C: Waste'],D:o['Dim D: Emissions'],
      E:o['Dim E: Procurement'],F:o['Dim F: Compliance'],
      G:o['Dim G: Chemicals (suppl.)'],H:o['Dim H: Customer (suppl.)'],
      date:o['Date']||'',fb:o['Open Feedback']||''};
  });
}

// ── SCORING ──────────────────────────────────────────────────────────────────
function computeScores(ans,isCul){
  const dims={};
  Object.keys(Q).forEach(id=>{
    const q=Q[id],a=ans[id];
    if(q.cul&&!isCul)return;
    if(a===undefined||a===null)return;
    let sc=null;
    if(q.t==='s'){const o=q.opts.find(([l])=>l===a);if(o&&o[1]!==null)sc=o[1];}
    else{const sel=Array.isArray(a)?a:[];const ss=sel.map(s=>{const o=q.opts.find(([l])=>l===s);return(o&&o[1]!==null)?o[1]:null;}).filter(v=>v!==null);if(ss.length)sc=ss.reduce((a,b)=>a+b,0)/ss.length;}
    if(sc===null)return;
    if(!dims[q.d])dims[q.d]=[];dims[q.d].push(sc);
  });
  const dav={};Object.keys(dims).forEach(d=>{dav[d]=Math.round(dims[d].reduce((a,b)=>a+b,0)/dims[d].length*100)/100;});
  let ws=0,wu=0;
  ['A','B','C','D','E','F'].forEach(d=>{if(dav[d]!=null){ws+=dav[d]*W[d];wu+=W[d];}});
  const gs=wu>0?Math.round((ws/wu)*100)/10:0;
  return{dimScores:dav,greenScore:gs,band:getBand(gs)};
}

// ── GAUGE ────────────────────────────────────────────────────────────────────
function Gauge({score,color}){
  const R=66,cx=88,cy=82,pct=Math.min(Math.max(score/100,0),1);
  const ang=Math.PI*(1-pct);
  const x1=cx-R,y1=cy,x2=cx+R*Math.cos(ang),y2=cy-R*Math.sin(ang),lg=pct>0.5?1:0;
  return e('svg',{width:176,height:98,viewBox:'0 0 176 98'},
    e('path',{d:`M${x1} ${y1} A${R} ${R} 0 0 1 ${cx+R} ${cy}`,fill:'none',stroke:'rgba(255,255,255,0.08)',strokeWidth:15}),
    pct>0&&e('path',{d:`M${x1} ${y1} A${R} ${R} 0 ${lg} 1 ${x2} ${y2}`,fill:'none',stroke:color,strokeWidth:15,strokeLinecap:'round'}),
    e('text',{x:cx,y:cy-9,textAnchor:'middle',fontSize:26,fontWeight:600,fill:color},score.toFixed(1)),
    e('text',{x:cx,y:cy+11,textAnchor:'middle',fontSize:11,fill:'rgba(255,255,255,0.35)'},'/100')
  );
}

// ── MINI CHART ───────────────────────────────────────────────────────────────
function MiniChart({data}){
  if(!data||!data.length)return null;
  const max=Math.max(...data.map(d=>parseFloat(d.score)||0),1);
  return e('div',{className:'bars'},
    data.map((d,i)=>{
      const ht=Math.max(4,((parseFloat(d.score)||0)/max)*64);
      const b=getBand(parseFloat(d.score)||0);
      return e('div',{key:i,className:'bw'},
        e('div',{className:'bbar',title:`${d.name}: ${d.score}`,style:{height:ht,background:b.c}}),
        e('div',{className:'blbl'},d.name.slice(0,5))
      );
    })
  );
}

// ── QUESTION BLOCK ───────────────────────────────────────────────────────────
function QBlock({qid,ans,onChange,isCul}){
  const q=Q[qid];
  if(q.cul&&!isCul)return null;
  const isM=q.t==='m';
  const sel=isM?(Array.isArray(ans)?ans:[]):(ans||null);
  function tog(label,score){
    if(isM){
      const none=score===0&&(label.indexOf('None')>=0||label.indexOf('Not applicable')>=0);
      if(none){onChange(qid,sel.indexOf(label)>=0?[]:[label]);return;}
      const cur=sel.filter(s=>{const o=q.opts.find(([l])=>l===s);return!(o&&o[1]===0&&(s.indexOf('None')>=0||s.indexOf('Not applicable')>=0));});
      onChange(qid,cur.indexOf(label)>=0?cur.filter(l=>l!==label):[...cur,label]);
    }else{onChange(qid,sel===label?null:label);}
  }
  return e('div',{className:`qb${q.cul?' cul':''}`},
    q.cul&&e('div',{className:'ctag'},'Culinary firms only'),
    e('div',{className:'ql'},q.lbl),
    e('div',{className:'opts'},q.opts.map(([label,score])=>{
      const act=isM?sel.indexOf(label)>=0:sel===label;
      return e('div',{key:label,className:`opt${act?' s':''}`,onClick:()=>tog(label,score)},
        e('div',{className:isM?'ck':'rd'},act&&e('span',{className:isM?'ci':'ri'},isM?'v':'')),
        e('span',null,label)
      );
    }))
  );
}

              e('div',{className:'dlbl'},e('span',{className:'ddot',style:{background:m.c}}),m.n,e('span',{style:{marginLeft:'auto',fontSize:9,color:'rgba(255,255,255,0.3)'}},(W[d]*100).toFixed(1)+'%')),
              e('div',{className:'dval',style:{color:m.c}},sc!=null?sc.toFixed(2):'—',e('span',{style:{fontSize:10,color:'rgba(255,255,255,0.35)',fontWeight:400}},' /10')),
              e('div',{className:'dbg'},e('div',{className:'dbf',style:{width:`${sc!=null?sc*10:0}%`,background:m.c}}))
            );
          })
        ),
        (ds.G!=null||ds.H!=null)&&e('div',{style:{marginBottom:16}},
          e('div',{style:{fontSize:11,fontWeight:500,color:'rgba(255,255,255,0.35)',marginBottom:7}},'Supplementary (unweighted)'),
          ['G','H'].map(d=>{const sc=ds[d];if(sc==null)return null;const m=DM[d];
            return e('div',{key:d,className:'sr'},
              e('span',{style:{minWidth:130,fontSize:11,color:'rgba(255,255,255,0.45)'}},m.n),
              e('div',{className:'sbg2'},e('div',{className:'dbf',style:{width:`${sc*10}%`,background:m.c}})),
              e('span',{style:{minWidth:30,textAlign:'right',fontSize:11,fontWeight:500}},sc.toFixed(1))
            );
          })
        ),
        e('div',{style:{display:'flex',gap:9,marginTop:6}},
          e('button',{className:'btn bp',onClick:()=>{reset();setView('form');}},'New Assessment'),
          e('button',{className:'btn bgrn',onClick:askDash},'View Dashboard')
        )
      )
    );
  }

  // ── FORM ─────────────────────────────────────────────────────────────────
  const sec=SECS[step],pct=Math.round(step/SECS.length*100);
  return e('div',{className:'app'},
    e('div',{className:'bar'},
      e('div',{className:'brand'},e('div',{className:'bico'},'🌿'),e('div',null,e('div',{className:'bsub'},'NUST BRP 2026'),e('div',{className:'btitle'},'Digital Green Evaluation Platform'))),
      e('div',{className:'nav'},e('button',{className:'nb',onClick:()=>setView('home')},'Home'),e('button',{className:'nb',onClick:askDash},'Dashboard'))
    ),
    toastEl,pwModal,
    e('div',{className:'fw',style:{flex:1,minHeight:400}},
      e('div',{className:'sb'},
        SECS.map((s,i)=>e('div',{key:s.id,className:`si${i===step?' a':''}`,onClick:()=>setStep(i)},
          e('div',{className:`dot${i===step?' cr':secDone(s)?' dn':''}`}),e('span',null,`${s.ico} ${s.lbl}`)
        ))
      ),
      e('div',{className:'fm'},
        sec.id==='profile'&&e('div',null,
          e('div',{className:'sh'},e('div',{className:'sbadge'},'🏢 Firm Profile'),e('h2',null,'About Your Business'),e('p',null,'Classification — not included in Green Score.')),
          PROFS.map(f=>e('div',{key:f.k,className:'qb'},
            e('div',{className:'ql'},f.lbl),
            f.t==='text'
              ?e('input',{className:'inp',value:profile[f.k]||'',placeholder:f.ph||f.lbl,onChange:ev=>setPro(f.k,ev.target.value)})
              :e('select',{className:'inp',value:profile[f.k]||'',onChange:ev=>setPro(f.k,ev.target.value)},f.opts.map(o=>e('option',{key:o,value:o},o||'— Select —')))
          ))
        ),
        sec.qs&&sec.qs.length>0&&sec.id!=='H'&&e('div',null,
          e('div',{className:'sh'},
            e('div',{className:'sbadge',style:{borderLeft:`3px solid ${(DM[sec.id]||{}).c||'#566573'}`}},
              `${sec.ico} ${sec.lbl}`,
              DM[sec.id]&&W[sec.id]&&e('span',{style:{marginLeft:8,fontSize:9,color:'rgba(255,255,255,0.35)'}},`AHP: ${(W[sec.id]*100).toFixed(1)}%`),
              DM[sec.id]&&!W[sec.id]&&e('span',{style:{marginLeft:8,fontSize:9,color:'rgba(255,255,255,0.35)'}},'Supplementary')
            ),
            e('h2',null,`Section ${sec.id}: ${DM[sec.id].n}`)
          ),
          sec.qs.map(qid=>e(QBlock,{key:qid,qid,ans:answers[qid],onChange:setAns,isCul}))
        ),
        sec.id==='H'&&e('div',null,
          e('div',{className:'sh'},
            e('div',{className:'sbadge',style:{borderLeft:`3px solid ${DM.H.c}`}},'👥 Customer Engagement',e('span',{style:{marginLeft:8,fontSize:9,color:'rgba(255,255,255,0.35)'}},'Supplementary')),
            e('h2',null,'Section H: Customer Engagement')
          ),
          sec.qs.map(qid=>e(QBlock,{key:qid,qid,ans:answers[qid],onChange:setAns,isCul})),
          e('div',{className:'qb',style:{marginTop:8}},
            e('div',{className:'ql'},'Open Feedback (optional)'),
            e('p',{style:{fontSize:11,color:'rgba(255,255,255,0.4)',marginBottom:8}},'Any practices not captured above, or questions that were unclear?'),
            e('textarea',{className:'inp ta',value:feedback,placeholder:'Share any additional comments...',onChange:ev=>setFeedback(ev.target.value)})
          )
        )
      )
    ),
    e('div',{className:'ff'},
      e('button',{className:'btn bg',onClick:()=>step>0&&setStep(s=>s-1),disabled:step===0},'← Previous'),
      e('div',{className:'pb'},e('div',{className:'pf',style:{width:`${pct}%`}})),
      e('span',{style:{fontSize:10,color:'rgba(255,255,255,0.3)',whiteSpace:'nowrap'}},`${step+1} / ${SECS.length}`),
      step<LAST
        ?e('button',{className:'btn bp',onClick:()=>setStep(s=>s+1)},'Next →')
        :e('button',{className:`btn bgrn${submitting?' disabled':''}`,onClick:submitting?null:finish,disabled:submitting},
            submitting?'Saving...':'Compute Green Score ✓')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));

</script>
</body>
</html>
